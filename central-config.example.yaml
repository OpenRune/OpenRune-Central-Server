# Copy to central-config.yaml (or set OPENRUNE_CONFIG to its path).
#
# Environment variables use OPENRUNE_* aliases (see CentralConfig.kt).

openrune:
  serverName: OpenRune

  auth:
    passwordHasher: bcrypt   # argon2 | bcrypt
    bcryptCost: 12

  db:
    host: 127.0.0.1
    port: 5432
    name: openrune_central
    user: openrune
    password: openrune
    poolSize: 10

  # Alternative: JDBC URL style
  # jdbc:
  #   url: jdbc:postgresql://127.0.0.1:5432/openrune_central

  http:
    port: 8080
    trustProxy: false

  worldLink:
    port: 9091
    soBacklog: 512
    readTimeoutSeconds: 120

  session:
    ttlMs: 60000

  analytics:
    onlineSampleIntervalSeconds: 3600

  javConfig:
    revision: 238
    remoteUrlTemplate: https://client.blurite.io/jav_local_%d.ws
    refreshMinutes: 15
    httpTimeoutSeconds: 20
    configProps:
      title: OpenRune Central  # client window title; serverName drives realm login message
      param.17: http://127.0.0.1:8080/worldslist.ws

  # Inserts development realm/world (id 255) on startup when true (default).
  devWorld:
    autoCreate: true

  # Per-phase login timing (Central LOGIN detail, world-link auth). Default off.
  # diagnostics:
  #   loginTimingLogs: true
  #   socialPmTraceLogs: true   # PM_TRACE lines for send/relay/deliver debugging
  # Or env: OPENRUNE_LOGIN_TIMING_LOGS=true / OPENRUNE_SOCIAL_PM_TRACE_LOGS=true
