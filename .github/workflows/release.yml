name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build shadow JAR
        run: ./gradlew :openrune-central:shadowJar --no-daemon

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: openrune-central/build/libs/openrune-central-server.jar
          generate_release_notes: true
