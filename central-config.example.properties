# Copy to central-config.properties.
# Supports placeholders like {env.DBPASS} or {env.dbpass}.
#openrune.http.port=8080

openrune.jdbc.url=jdbc:postgresql://127.0.0.1:5432/openrune_central
openrune.db.user=openrune
openrune.db.password=openrune
openrune.db.poolSize=10

openrune.sessionTtlMs=300000
# Online player samples for charts (seconds). Default 3600 = once per hour.
#openrune.onlineSampleIntervalSeconds=3600
openrune.worldsLinkPort=9091
openrune.worldsLinkSoBacklog=512

# Client jav config proxy: GET /jav_config.ws (default revision 238 if unset)
openrune.javConfig.revision=238
#openrune.javConfig.remoteUrlTemplate=https://client.blurite.io/jav_local_%d.ws
#openrune.javConfig.refreshMinutes=15
#openrune.javConfig.httpTimeoutSeconds=20
#
# Optional overrides — only keys you set are replaced in the downloaded file.
# Per-key (use param.N / msg.key for param= and msg= lines):
#openrune.javConfig.configProps.title=My Server
#openrune.javConfig.configProps.codebase=http://127.0.0.1/
#openrune.javConfig.configProps.cachedir=myrealm
#openrune.javConfig.configProps.param.25=238
#openrune.javConfig.configProps.param.13=.myrealm.com
#
# Or multiline block (each line is a full jav-config line: key=value or param=id=value):
#openrune.javConfig.configProps=title=My Server\n\
#codebase=http://127.0.0.1/\n\
#param=25=238
